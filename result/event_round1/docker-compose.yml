services:
  postgres:
    image: postgres:18-alpine
    container_name: cctest-postgres
    environment:
      POSTGRES_DB: cctest
      POSTGRES_USER: cctest
      POSTGRES_PASSWORD: cctest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cctest"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
